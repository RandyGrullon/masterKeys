<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 520" width="880" height="520" font-family="Segoe UI, Helvetica, Arial, sans-serif">
  <style>
    .ln    { stroke:#8a8a8a; stroke-width:1.4; }
    .ledg  { stroke:#8a8a8a; stroke-width:1.8; }
    .bar   { stroke:#8a8a8a; stroke-width:3; }
    .lbl   { fill:#8a8a8a; font-size:12.5px; text-anchor:middle; }
    .ttl   { fill:#8a8a8a; font-size:15px; font-weight:700; letter-spacing:1px; }
    .cap   { fill:#8a8a8a; font-size:12.5px; }
    .clef  { fill:#8a8a8a; font-size:64px; font-family:"Segoe UI Symbol","Bravura","Noto Music",serif; }
    .cflbl { fill:#8a8a8a; font-size:11px; text-anchor:middle; }
    .anchor{ fill:#e05a5a; }
    .aname { fill:#e05a5a; font-size:14px; font-weight:700; text-anchor:middle; }
    .lead  { stroke:#e05a5a; stroke-width:1; stroke-dasharray:3 4; opacity:.6; }
  </style>

  <text class="ttl" x="30" y="30">LAS 4 ANCLAS — no leas nota por nota, mide desde estas</text>

  <!-- ===== PENTAGRAMA DE SOL: lineas y = 80,100,120,140,160 ===== -->
  <g class="ln">
    <line x1="150" y1="80"  x2="840" y2="80"/>
    <line x1="150" y1="100" x2="840" y2="100"/>
    <line x1="150" y1="120" x2="840" y2="120"/>
    <line x1="150" y1="140" x2="840" y2="140"/>
    <line x1="150" y1="160" x2="840" y2="160"/>
  </g>
  <text class="clef"  x="158" y="158">&#119070;</text>
  <text class="cflbl" x="80"  y="124">clave de SOL</text>

  <!-- ===== PENTAGRAMA DE FA: lineas y = 300,320,340,360,380 ===== -->
  <g class="ln">
    <line x1="150" y1="300" x2="840" y2="300"/>
    <line x1="150" y1="320" x2="840" y2="320"/>
    <line x1="150" y1="340" x2="840" y2="340"/>
    <line x1="150" y1="360" x2="840" y2="360"/>
    <line x1="150" y1="380" x2="840" y2="380"/>
  </g>
  <text class="clef"  x="160" y="348">&#119074;</text>
  <text class="cflbl" x="80"  y="344">clave de FA</text>

  <line class="bar" x1="150" y1="80"  x2="150" y2="160"/>
  <line class="bar" x1="838" y1="80"  x2="838" y2="160"/>
  <line class="bar" x1="150" y1="300" x2="150" y2="380"/>
  <line class="bar" x1="838" y1="300" x2="838" y2="380"/>

  <!-- ANCLA · FA3 — 4a linea de la clave de fa -->
  <ellipse class="anchor" cx="200" cy="320" rx="9.5" ry="6.8" transform="rotate(-18 200 320)"/>
  <line class="lead" x1="200" y1="330" x2="200" y2="424"/>

  <!-- ANCLA · SOL4 — 2a linea de la clave de sol -->
  <ellipse class="anchor" cx="380" cy="140" rx="9.5" ry="6.8" transform="rotate(-18 380 140)"/>
  <line class="lead" x1="380" y1="150" x2="380" y2="424"/>

  <!-- ANCLA · DO4 central — linea adicional, en ambos pentagramas -->
  <line class="ledg" x1="552" y1="200" x2="588" y2="200"/>
  <ellipse class="anchor" cx="570" cy="200" rx="9.5" ry="6.8" transform="rotate(-18 570 200)"/>
  <line class="ledg" x1="552" y1="260" x2="588" y2="260"/>
  <ellipse class="anchor" cx="570" cy="260" rx="9.5" ry="6.8" transform="rotate(-18 570 260)"/>
  <line class="lead" x1="570" y1="210" x2="570" y2="250"/>
  <line class="lead" x1="570" y1="270" x2="570" y2="424"/>

  <!-- ANCLA · DO5 — 3er espacio de la clave de sol -->
  <ellipse class="anchor" cx="750" cy="110" rx="9.5" ry="6.8" transform="rotate(-18 750 110)"/>
  <line class="lead" x1="750" y1="120" x2="750" y2="424"/>

  <!-- ============ ETIQUETAS — 4 columnas, todas fuera del sistema ============ -->
  <text class="aname" x="200" y="444">FA3</text>
  <text class="lbl"   x="200" y="463">4ª línea</text>
  <text class="lbl"   x="200" y="480">entre los 2 puntos</text>

  <text class="aname" x="380" y="444">SOL4</text>
  <text class="lbl"   x="380" y="463">2ª línea</text>
  <text class="lbl"   x="380" y="480">ahí se enrosca la clave</text>

  <text class="aname" x="570" y="444">DO4 central</text>
  <text class="lbl"   x="570" y="463">línea adicional</text>
  <text class="lbl"   x="570" y="480">en medio del sistema</text>

  <text class="aname" x="750" y="444">DO5</text>
  <text class="lbl"   x="750" y="463">3er espacio</text>

  <text class="cap" x="30" y="508">Las dos notas rojas del centro son el MISMO DO4: arriba escrito en clave de sol, abajo en clave de fa. Es la bisagra del sistema.</text>
</svg>
