<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 326" width="880" height="326" font-family="Segoe UI, Helvetica, Arial, sans-serif">
  <style>
    .wk { fill:none; stroke:#8a8a8a; stroke-width:1.6; }
    .bk { fill:#8a8a8a; }
    .nm { fill:#8a8a8a; font-size:13px; text-anchor:middle; }
    .oct{ fill:#8a8a8a; font-size:11px; text-anchor:middle; }
    .hi { fill:#e05a5a; opacity:.18; }
    .hit{ fill:#e05a5a; font-size:13px; font-weight:700; text-anchor:middle; }
    .ttl{ fill:#8a8a8a; font-size:15px; font-weight:700; letter-spacing:1px; }
    .grp{ fill:#3b8fe0; opacity:.16; }
    .grpt{ fill:#3b8fe0; font-size:12px; text-anchor:middle; font-weight:700; }
  </style>

  <text class="ttl" x="30" y="26">EL TECLADO SE ORIENTA POR LOS GRUPOS DE NEGRAS — 2 y 3</text>

  <!-- 14 white keys = 2 octaves. width 56, from x=40, y=60..230 -->
  <!-- highlight for middle C (first key) -->
  <rect class="hi" x="40" y="60" width="56" height="170"/>

  <g class="wk">
    <rect x="40"  y="60" width="56" height="170"/>
    <rect x="96"  y="60" width="56" height="170"/>
    <rect x="152" y="60" width="56" height="170"/>
    <rect x="208" y="60" width="56" height="170"/>
    <rect x="264" y="60" width="56" height="170"/>
    <rect x="320" y="60" width="56" height="170"/>
    <rect x="376" y="60" width="56" height="170"/>
    <rect x="432" y="60" width="56" height="170"/>
    <rect x="488" y="60" width="56" height="170"/>
    <rect x="544" y="60" width="56" height="170"/>
    <rect x="600" y="60" width="56" height="170"/>
    <rect x="656" y="60" width="56" height="170"/>
    <rect x="712" y="60" width="56" height="170"/>
    <rect x="768" y="60" width="56" height="170"/>
  </g>

  <!-- black keys: after C,D  (gap)  after F,G,A -->
  <g class="bk">
    <rect x="78"  y="60" width="34" height="105" rx="3"/>
    <rect x="134" y="60" width="34" height="105" rx="3"/>
    <rect x="246" y="60" width="34" height="105" rx="3"/>
    <rect x="302" y="60" width="34" height="105" rx="3"/>
    <rect x="358" y="60" width="34" height="105" rx="3"/>
    <rect x="470" y="60" width="34" height="105" rx="3"/>
    <rect x="526" y="60" width="34" height="105" rx="3"/>
    <rect x="638" y="60" width="34" height="105" rx="3"/>
    <rect x="694" y="60" width="34" height="105" rx="3"/>
    <rect x="750" y="60" width="34" height="105" rx="3"/>
  </g>

  <!-- group brackets -->
  <rect class="grp" x="74" y="38" width="98" height="16" rx="4"/>
  <text class="grpt" x="123" y="51">grupo de 2</text>
  <rect class="grp" x="242" y="38" width="154" height="16" rx="4"/>
  <text class="grpt" x="319" y="51">grupo de 3</text>

  <!-- white key names -->
  <g class="nm">
    <text x="68"  y="255">DO</text>
    <text x="124" y="255">RE</text>
    <text x="180" y="255">MI</text>
    <text x="236" y="255">FA</text>
    <text x="292" y="255">SOL</text>
    <text x="348" y="255">LA</text>
    <text x="404" y="255">SI</text>
    <text x="460" y="255">DO</text>
    <text x="516" y="255">RE</text>
    <text x="572" y="255">MI</text>
    <text x="628" y="255">FA</text>
    <text x="684" y="255">SOL</text>
    <text x="740" y="255">LA</text>
    <text x="796" y="255">SI</text>
  </g>

  <text class="hit" x="68"  y="285">DO4 central</text>
  <text class="oct" x="460" y="285">DO5</text>

  <text x="40" y="312" fill="#8a8a8a" font-size="13">Regla: DO siempre está a la IZQUIERDA del grupo de 2 negras. FA, a la izquierda del grupo de 3.</text>
</svg>
